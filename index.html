<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Compteur de caractere </title>
</head>
<body>
    <header>
        
        <h1>compteur de mot et de caractere  </h1>
    </header>

    <main>
        <!-- div pour le TEXTAREA -->
        <div class="container">
            <textarea name="" id="word-textarea" ></textarea>
            <div class="btns">
                <button class="btn-valider">Valider</button>
                <button class="btn-reset">Reset </button>
            </div>
            

            <div class="answer">
                

                <div  class="box box1">
                    <p class="nb-word">0 mot sans espace   </p>
                </div>

                <div  class="box box2">
                    <p class="nb-caractere"> 0 caractere avec espace </p>
                </div>
                <div  class="box box3">
                    <p class="nb-space"> 0 espace </p>
                </div>
            </div>
        </div>
    </main>
    
    <!-- SCRIPT JS  -->
     <script src="script.js"></script>
</body>
</html>
